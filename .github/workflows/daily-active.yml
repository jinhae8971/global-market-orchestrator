name: Daily Global Orchestrator

on:
  schedule:
    # 07:00 KST = 22:00 UTC (previous day)
    # Runs 1h after the agent data refreshes at 06:00 KST.
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-orchestrator
  cancel-in-progress: false

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }
      - run: pip install -e .

      - name: Run orchestrator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CRYPTO_DASHBOARD_URL: ${{ vars.CRYPTO_DASHBOARD_URL }}
          KOSPI_DASHBOARD_URL: ${{ vars.KOSPI_DASHBOARD_URL }}
          SP500_DASHBOARD_URL: ${{ vars.SP500_DASHBOARD_URL }}
          NASDAQ_DASHBOARD_URL: ${{ vars.NASDAQ_DASHBOARD_URL }}
          DOW30_DASHBOARD_URL: ${{ vars.DOW30_DASHBOARD_URL }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: python -m src.main

      - name: Commit reports
        run: |
          git config user.name  "global-orchestrator-bot"
          git config user.email "global-orchestrator-bot@users.noreply.github.com"
          git add docs/reports
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: global report $(date -u +%F)"
            push_ok=false
            for i in 1 2 3 4; do
              if git push; then
                echo "push succeeded"
                push_ok=true
                break
              fi
              sleep $((2 ** i))
            done
            if [ "$push_ok" = false ]; then
              echo "::error::git push failed after 4 retries"
              exit 1
            fi
          fi

      - name: Notify failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="⚠️ Global Market Orchestrator pipeline failed on $(date -u +%F)%0ACheck: https://github.com/jinhae8971/global-market-orchestrator/actions"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}" \
            -d parse_mode="HTML" || true

  deploy-pages:
    needs: orchestrate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ github.ref }}" }
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: ./docs }
      - id: deployment
        uses: actions/deploy-pages@v4
